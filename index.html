<head>

    <title>קיבוץ-Guessr</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary-green: #4CAF50;
            --dark-green: #388E3C;
            --earth-brown: #5D4037;
            --light-earth: #D7CCC8;
            --bg-color: #F9FBE7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-image: url('bg.png'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            margin: 0;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
        }

        .panel {
            background-color: rgba(255, 255, 255, 0.95);
            border: 5px solid var(--earth-brown);
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0 10px 0; 
            text-align: center;
            width: 95vw;
            max-width: 450px;
            box-sizing: border-box; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            z-index: 10;
        }

        #welcome-panel { display: none; }
        #game-panel { display: none; }
        #loading-panel { display: block; }

        #top-stats-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; min-height: 24px; font-size: 18px; font-weight: bold;
        }

        #round-info { color: var(--dark-green); }
        #result-msg { color: var(--earth-brown); }

        #leaderboard-container {
            display: flex; justify-content: space-between; align-items: stretch;
            background: #e8f5e9; border: 2px solid var(--primary-green);
            border-radius: 8px; margin-bottom: 20px; overflow: hidden;
        }

        #global-leaderboard {
            width: 65%; padding: 10px; text-align: right; font-size: 14px;
        }
        #global-leaderboard h4 { margin: 0 0 8px 0; color: var(--dark-green); font-size: 15px; text-align: center;}
        #top5-list { margin: 0; padding-right: 20px; font-weight: bold; color: #333; }
        #top5-list li { margin-bottom: 4px; }

        #my-score-section {
            width: 35%; background: rgba(76, 175, 80, 0.1); border-right: 2px solid var(--primary-green);
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px;
        }
        .my-score-title { font-size: 14px; font-weight: bold; color: var(--dark-green); margin-bottom: 5px; }
        #high-score-val { font-size: 24px; font-weight: 900; color: var(--earth-brown); }

        .kibbutz-sign-container {
            position: relative; display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .sign-pole {
            position: absolute; top: 0; bottom: -30px; width: 14px; background: #4E342E; z-index: 1; border-left: 3px solid #3E2723; border-radius: 2px;
        }

        .sign-board {
            position: relative; z-index: 2; background: #5D4037; color: white; font-weight: 900; font-size: 24px; border: 2px solid #FFF;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.5); text-shadow: 1px 1px 2px #000; width: max-content;
        }

        .sign-right { transform: rotate(-3deg) translateX(10px); padding: 8px 15px 8px 25px; border-radius: 4px 0 0 4px; }
        .sign-right::after { content: ''; position: absolute; right: -20px; top: -2px; width: 0; height: 0; border-top: 23px solid transparent; border-bottom: 23px solid transparent; border-left: 20px solid #FFF; z-index: -1; }
        .sign-right::before { content: ''; position: absolute; right: -16px; top: 1px; width: 0; height: 0; border-top: 20px solid transparent; border-bottom: 20px solid transparent; border-left: 17px solid #5D4037; z-index: 3; }

        .sign-left { transform: rotate(2deg) translateX(-10px); padding: 8px 25px 8px 15px; border-radius: 0 4px 4px 0; }
        .sign-left::after { content: ''; position: absolute; left: -20px; top: -2px; width: 0; height: 0; border-top: 23px solid transparent; border-bottom: 23px solid transparent; border-right: 20px solid #FFF; z-index: -1; }
        .sign-left::before { content: ''; position: absolute; left: -16px; top: 1px; width: 0; height: 0; border-top: 20px solid transparent; border-bottom: 20px solid transparent; border-right: 17px solid #5D4037; z-index: 3; }

        #kibbutz-name {
            font-size: clamp(20px, 4vw, 24px); font-weight: 900; color: var(--earth-brown);
            margin-bottom: 8px; line-height: 1.4; text-shadow: 1px 1px 0px #fff; text-align: center;
        }

        #timer-container {
            width: 100%; height: 12px; background-color: #eee; border-radius: 6px;
            margin-bottom: 10px; overflow: hidden; display: none; border: 1px solid #ddd;
        }
        #timer-bar { width: 100%; height: 100%; background: linear-gradient(to left, var(--primary-green), #FFC107, #F44336); transition: width 0.1s linear; }

        #map-wrapper {
            position: relative; width: 95vw; max-width: 450px; box-sizing: border-box; height: 65vh; 
            margin-bottom: 15px; border: 5px solid var(--earth-brown); border-radius: 12px;
            overflow: hidden; z-index: 1; background-color: #ddd; cursor: crosshair; box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            flex-grow: 1;
            max-height: 60vh;
        }

        #map { width: 100%; height: 100%; border: none; border-radius: 0; margin: 0; z-index: 1; filter: brightness(1.00) contrast(1.02); }

        /* אלמנטים משותפים לאנימציות */
        .scene-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 9998; pointer-events: none; display: none; }

        /* סצנת הטרקטור */
        #plowed-dirt {
            position: absolute; right: 0; top: 0; height: 100%; width: 0%; background-color: #4E342E;
            background-image: linear-gradient(rgba(0,0,0,0.3) 3px, transparent 3px), radial-gradient(#3E2723 30%, transparent 40%), radial-gradient(#2E1A14 25%, transparent 35%);
            background-size: 100% 15px, 20px 20px, 15px 15px; background-position: 0 0, 0 0, 10px 10px; opacity: 0.95; box-shadow: inset 0 0 25px rgba(0,0,0,0.8);
        }
        #the-tractor { position: absolute; top: 50%; right: -100%; width: clamp(240px, 55vw, 450px); transform: translateY(-50%); }
        #the-tractor img { width: 100%; height: auto; display: block; filter: drop-shadow(8px 10px 15px rgba(0,0,0,0.6)); }
        .tractor-shaking { animation: tShake 0.2s infinite; }
        @keyframes tShake { 0% { transform: translateY(-50%) rotate(0deg); } 25% { transform: translateY(-50.5%) rotate(-0.5deg); } 50% { transform: translateY(-49.5%) rotate(0.5deg); } 75% { transform: translateY(-50.2%) rotate(-0.2deg); } 100% { transform: translateY(-50%) rotate(0deg); } }

        /* סצנת האלומה */
        #wheat-field {
            position: absolute; right: 0; top: 0; height: 100%; width: 0%; background-color: #FFC107;
            background-image: repeating-linear-gradient(-45deg, transparent, transparent 10px, rgba(212, 175, 55, 0.4) 10px, rgba(212, 175, 55, 0.4) 20px);
            opacity: 0.9; box-shadow: inset 0 0 25px rgba(0,0,0,0.3);
        }
        #the-sheaf { position: absolute; top: 50%; left: 150%; width: clamp(240px, 55vw, 420px); transform: translate(-50%, -50%); }
        #the-sheaf img { width: 100%; height: auto; display: block; filter: drop-shadow(8px 10px 15px rgba(0,0,0,0.6)); }

        /* סצנת חדר האוכל */
        #dining-hall {
            position: absolute; top: 0; left: 0; height: 100%; width: 100%; background-color: #F5EEDA;
            background-image: linear-gradient(#D2B48C 15px, transparent 15px);
            background-size: 100% 100px; background-position: 0 70%;
            opacity: 0.95; box-shadow: inset 0 0 50px rgba(0,0,0,0.2); display: none; z-index: 9998; pointer-events: none;
        }
        #the-vibe { position: absolute; bottom: 10%; left: 50%; width: clamp(280px, 60vw, 500px); transform: translateX(200%); }
        #the-vibe img { width: 100%; height: auto; display: block; filter: drop-shadow(8px 8px 12px rgba(0,0,0,0.4)); }

        button {
            background-color: var(--primary-green); color: white; border: none; padding: 12px 20px;
            font-size: clamp(16px, 3vw, 18px); border-radius: 8px; cursor: pointer; width: 100%;
            font-weight: bold; margin-top: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: transform 0.1s, background-color 0.2s;
        }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        .leaflet-tooltip.custom-tooltip {
            background: transparent !important; border: none !important; box-shadow: none !important;
            font-weight: 900; font-size: clamp(14px, 3vw, 18px); color: #d32f2f;
            text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
        }
        .leaflet-tooltip.custom-tooltip::before { display: none !important; }

        .score-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 60px; font-weight: bold; color: var(--dark-green); text-shadow: 2px 2px 10px rgba(255,255,255,0.8);
            z-index: 10000; pointer-events: none; animation: scoreFloat 1.5s ease-out forwards;
        }
        @keyframes scoreFloat { 0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); } 20% { opacity: 1; transform: translate(-50%, -50px) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -150px) scale(1); } }

        #farmer-container {
            position: fixed; bottom: -600px; left: -300px; transform: rotate(-30deg);
            transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 9999; pointer-events: none; display: flex; flex-direction: column; align-items: flex-start;
        }
        #farmer-container.show { bottom: -40px; left: -20px; transform: rotate(10deg); }
        #farmer-character img { width: clamp(250px, 70vw, 450px); height: auto; display: block; filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.5)); }
        
        #speech-bubble {
            background: white; border: 4px solid var(--dark-green); border-radius: 20px; padding: 12px 18px;
            margin-bottom: 5px; margin-left: 80px; display: inline-block; position: relative; box-shadow: 0 6px 12px rgba(0,0,0,0.3); font-weight: bold; color: #333; transform: rotate(-10deg); font-size: clamp(22px, 6vw, 30px); max-width: 250px;
        }

        .shake { animation: shakeEffect 0.5s infinite; }
        @keyframes shakeEffect { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-2px, -1px) rotate(-1deg); } 40% { transform: translate(-1px, 2px) rotate(1deg); } 60% { transform: translate(2px, 1px) rotate(0deg); } 80% { transform: translate(-1px, -2px) rotate(-1deg); } 100% { transform: translate(1px, 2px) rotate(0deg); } }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="loading-panel" class="panel">
        <h3>טוען קיבוצים...</h3>
        <p>תתחיל להתניע... 🚜</p>
    </div>

    <div id="welcome-panel" class="panel">
        <div class="kibbutz-sign-container" style="margin-bottom: 25px;">
            <div class="sign-pole"></div>
            <div class="sign-board sign-right">משחק</div>
            <div class="sign-board sign-left">הקיבוצים</div>
        </div>
        
        <div id="leaderboard-container">
            <div id="global-leaderboard">
                <h4>🏆 טופ 5 העולמי 🏆</h4>
                <ol id="top5-list"></ol>
            </div>
            <div id="my-score-section">
                <div class="my-score-title">השיא שלי</div>
                <div id="high-score-val">0</div>
            </div>
        </div>

        <h3 style="color:var(--dark-green); margin-top: 5px; margin-bottom: 10px;">הכנס שם: </h3>
        <input type="text" id="player-nickname" placeholder="למשל: אלוף העמק" maxlength="15" style="width: 80%; padding: 10px; font-size: 18px; border: 2px solid var(--earth-brown); border-radius: 8px; margin-bottom: 15px; text-align: center;">
        <button onclick="submitNickname()">למשחק!</button>
    </div>

    <div id="game-panel" class="panel">
        <div id="kibbutz-name"></div>
        <div id="top-stats-bar">
            <div id="round-info"></div>
            <div id="result-msg"></div>
        </div>
        <div id="timer-container"><div id="timer-bar"></div></div>
        <button id="start-btn" onclick="startRound()">התחל משחק</button>
    </div>

    <div id="map-wrapper">
        <div id="map"></div>
        
        <div id="tractor-scene" class="scene-layer">
            <div id="plowed-dirt"></div>
            <div id="the-tractor"><img src="tractor.png" alt="טרקטור פרגוסון"></div>
        </div>

        <div id="sheaf-scene" class="scene-layer">
            <div id="wheat-field"></div>
            <div id="the-sheaf"><img src="aluma.png" alt="אלומה"></div>
        </div>

        <div id="dining-hall">
            <div id="the-vibe"><img src="kibbutz_vibe.png" alt="הפרלמנט"></div>
        </div>
    </div>

    <div id="farmer-container">
        <div id="speech-bubble"></div>
        <div id="farmer-character"><img src="farmer.png" alt="חקלאי"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAVXoCgOCgB9m1GOa1bbFen1rEzXCjEhvQ",
          authDomain: "kibbutzes.firebaseapp.com",
          projectId: "kibbutzes",
          storageBucket: "kibbutzes.firebasestorage.app",
          messagingSenderId: "433815834468",
          appId: "1:433815834468:web:a30ab44821a3652e35f471"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let kibbutzim = [];
        let currentKibbutz = null;
        let timerInterval;
        let timeLeft = 15;
        let map, actualMarker, guessMarker, resultLine;
        let isRoundActive = false;
        let currentRound = 1;
        const MAX_ROUNDS = 10;
        let totalScore = 0;
        let highScore = 0;
        let playerName = ""; 
        
        let specialRounds = [];
        let farmerRounds = [];
        
        let availableAnims = ['tractor', 'sheaf', 'vibe'];
        let playedAnimsCount = 0;

        let mapLayer, satelliteLayer;

        const sndWind = new Audio('https://www.soundjay.com/nature/sounds/wind-01.mp3');
        const sndTractor = new Audio('https://actions.google.com/sounds/v1/transportation/tractor_driving_by.ogg');
        const sndDining = new Audio('https://actions.google.com/sounds/v1/ambience/coffee_shop.ogg'); 

        async function initMap() {
            mapLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap' });
            satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles &copy; Esri' });

            map = L.map('map', {zoomControl: false}).setView([31.5, 34.9], 7);
            mapLayer.addTo(map);
            
            loadHighScore();
            fetchGlobalLeaderboard(); 
            await fetchKibbutzimData(); 
        }

        async function fetchKibbutzimData() {
            try {
                const savedData = localStorage.getItem('kibbutzim_data_v2');
                if (savedData) {
                    kibbutzim = JSON.parse(savedData);
                    showWelcomePanel();
                    return;
                }

                const response = await fetch('kibbutzim.kml');
                if (!response.ok) throw new Error("לא הצלחתי לטעון את הקובץ");
                
                const text = await response.text();
                const xmlDoc = new DOMParser().parseFromString(text, "text/xml");
                const placemarks = xmlDoc.getElementsByTagName("Placemark");
                
                kibbutzim = [];
                for (let p of placemarks) {
                    const name = p.getElementsByTagName("name")[0]?.textContent;
                    const coords = p.getElementsByTagName("coordinates")[0]?.textContent.split(',');
                    if (name && coords) kibbutzim.push({name: name.trim(), lng: parseFloat(coords[0]), lat: parseFloat(coords[1])});
                }

                localStorage.setItem('kibbutzim_data_v2', JSON.stringify(kibbutzim));
                showWelcomePanel();

            } catch (error) {
                console.error(error);
                document.getElementById('loading-panel').innerHTML = "<h3>שגיאה!</h3><p>קובץ ה-KML לא נמצא או שיש לו שם אחר.</p>";
            }
        }

        function showWelcomePanel() {
            document.getElementById('loading-panel').style.display = 'none';
            document.getElementById('welcome-panel').style.display = 'block';
            
            if (playerName && playerName !== "אורח") {
                document.getElementById('player-nickname').value = playerName;
            }
        }

        function submitNickname() {
            const input = document.getElementById('player-nickname').value.trim();
            if (input !== "") {
                playerName = input;
            } else if (!playerName) {
                playerName = "אורח";
            }
            
            currentRound = 1; 
            totalScore = 0; 
            specialRounds = pickSpecialRounds();
            farmerRounds = pickFarmerRounds();
            
            // מחזירים את האנימציות למלאי בכל תחילת משחק
            availableAnims = ['tractor', 'sheaf', 'vibe'];
            playedAnimsCount = 0;

            document.getElementById('welcome-panel').style.display = 'none';
            document.getElementById('game-panel').style.display = 'block';
            
            document.getElementById('start-btn').innerText = "התחל משחק";
            document.getElementById('start-btn').onclick = startRound;
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('kibbutz-name').innerHTML = "מוכן להתחיל?";
            document.getElementById('round-info').innerText = "";
            document.getElementById('result-msg').innerText = "";
            
            if (actualMarker) map.removeLayer(actualMarker);
            if (guessMarker) map.removeLayer(guessMarker);
            if (resultLine) map.removeLayer(resultLine);
            map.setView([31.5, 34.9], 7);
        }

        function resetToWelcome() {
            fetchGlobalLeaderboard();
            document.getElementById('game-panel').style.display = 'none';
            showWelcomePanel();
        }

        async function fetchGlobalLeaderboard() {
            try {
                const snapshot = await db.collection('leaderboard').orderBy('score', 'desc').limit(5).get();
                const list = document.getElementById('top5-list');
                list.innerHTML = '';
                
                if (snapshot.empty) return;

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const li = document.createElement('li');
                    li.innerText = `${data.name} - ${data.score} נק'`;
                    list.appendChild(li);
                });
                
            } catch (e) {
                console.error("שגיאה בטעינת טבלה: ", e);
                document.getElementById('top5-list').innerHTML = '';
            }
        }

        async function saveScoreToLeaderboard(score) {
            if (score <= 0 || !playerName) return;
            try {
                const querySnapshot = await db.collection('leaderboard').where('name', '==', playerName).get();
                
                if (!querySnapshot.empty) {
                    let docId = null;
                    let existingScore = -1;
                    
                    querySnapshot.forEach(doc => {
                        const data = doc.data();
                        if (data.score > existingScore) {
                            existingScore = data.score;
                            docId = doc.id;
                        }
                    });

                    if (score > existingScore) {
                        await db.collection('leaderboard').doc(docId).update({
                            score: score,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                } else {
                    await db.collection('leaderboard').add({
                        name: playerName,
                        score: score,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
            } catch (e) {
                console.error("שגיאה בשמירת התוצאה: ", e);
            }
        }

        function loadHighScore() {
            const saved = localStorage.getItem('kibbutz_high_score_v3');
            if (saved) {
                highScore = parseInt(saved);
                document.getElementById('high-score-val').innerText = highScore;
            }
        }

        function updateHighScore(newScore) {
            if (newScore > highScore) {
                highScore = newScore;
                localStorage.setItem('kibbutz_high_score_v3', highScore);
                document.getElementById('high-score-val').innerText = highScore;
            }
        }

        function pickSpecialRounds() {
            let rounds = [];
            while(rounds.length < 1) { let r = Math.floor(Math.random() * 10) + 1; if(!rounds.includes(r)) rounds.push(r); }
            return rounds;
        }

        function pickFarmerRounds() {
            return [ Math.floor(Math.random() * 3) + 1, Math.floor(Math.random() * 3) + 4, Math.floor(Math.random() * 3) + 7 ];
        }

        function startRound() {
            document.getElementById('farmer-container').classList.remove('show');
            
            document.getElementById('result-msg').innerText = "";
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('timer-container').style.display = 'block';
            
            if (actualMarker) map.removeLayer(actualMarker);
            if (guessMarker) map.removeLayer(guessMarker);
            if (resultLine) map.removeLayer(resultLine);

            const randomIndex = Math.floor(Math.random() * kibbutzim.length);
            currentKibbutz = kibbutzim[randomIndex];
            
            document.getElementById('kibbutz-name').innerText = `איפה זה: ${currentKibbutz.name}?`;
            document.getElementById('round-info').innerText = `סבב: ${currentRound}/10`;

            isRoundActive = true;
            timeLeft = 15;
            updateTimerBar();

            timerInterval = setInterval(() => { timeLeft -= 0.1; updateTimerBar(); if (timeLeft <= 0) endRound(null); }, 100);
        }

        function updateTimerBar() { document.getElementById('timer-bar').style.width = ((timeLeft / 15) * 100) + "%"; }

        function handleMapClick(e) { if (isRoundActive) endRound(e.latlng); }

        async function endRound(guessLatlng) {
            clearInterval(timerInterval);
            isRoundActive = false;
            document.getElementById('timer-container').style.display = 'none';

            const timeUsed = 15 - timeLeft;
            const actualLatlng = L.latLng(currentKibbutz.lat, currentKibbutz.lng);
            let isSpecial = specialRounds.includes(currentRound);

            actualMarker = L.circleMarker(actualLatlng, { radius: 6, color: '#d32f2f', fillColor: '#f44336', fillOpacity: 1 }).addTo(map);
            actualMarker.bindTooltip(currentKibbutz.name, { permanent: true, direction: 'top', className: 'custom-tooltip', offset: [0, -10] }).openTooltip();

            let dist = 999;
            if (guessLatlng) {
                guessMarker = L.marker(guessLatlng).addTo(map);
                resultLine = L.polyline([guessLatlng, actualLatlng], {color: '#d32f2f', weight: 3, dashArray: '5, 5'}).addTo(map);
                dist = guessLatlng.distanceTo(actualLatlng) / 1000;
                
                let points = Math.max(0, Math.floor(100 * Math.exp(-dist / 30)));
                totalScore += points;
                
                showFloatingScore(points);
                document.getElementById('result-msg').innerText = `מרחק: ${dist.toFixed(1)} ק"מ`;
                map.fitBounds(L.latLngBounds(guessLatlng, actualLatlng), {padding: [40, 40]});
            } else {
                document.getElementById('result-msg').innerText = "נגמר הזמן!";
                map.setView(actualLatlng, 10);
            }

            if (isSpecial && dist <= 3) {
                isSpecial = false;
                if (currentRound < MAX_ROUNDS) { specialRounds.push(currentRound + 1); }
            }

            if (farmerRounds.includes(currentRound) || dist <= 3) { triggerFarmerAndAnimLogic(dist, timeUsed); }

            if (isSpecial) {
                await new Promise(r => setTimeout(r, 1200));
                map.removeLayer(actualMarker);
                if (guessMarker) map.removeLayer(guessMarker);
                if (resultLine) map.removeLayer(resultLine);
                mapLayer.remove(); satelliteLayer.addTo(map);
                
                map.flyTo(actualLatlng, 15, {duration: 3.3});
                await new Promise(r => setTimeout(r, 4600)); 
                map.flyTo(actualLatlng, 12, {duration: 2.3});
                await new Promise(r => setTimeout(r, 3800)); 
                
                satelliteLayer.remove(); mapLayer.addTo(map); map.setView([31.5, 34.9], 7);
            }

            const startBtn = document.getElementById('start-btn');
            startBtn.style.display = 'block';
            
            if (currentRound < MAX_ROUNDS) {
                currentRound++; 
                startBtn.innerText = "לסיבוב הבא";
            } else {
                updateHighScore(totalScore);
                startBtn.innerText = "שומר תוצאה...";
                startBtn.disabled = true;
                await saveScoreToLeaderboard(totalScore);
                startBtn.innerText = "משחק חדש";
                startBtn.disabled = false;
                startBtn.onclick = resetToWelcome;
                document.getElementById('kibbutz-name').innerHTML = `המשחק הסתיים!<br><span style="color:var(--dark-green);font-size:1.2em;display:block;margin-top:10px;">סך הכל ניקוד: ${totalScore}</span>`;
                document.getElementById('round-info').innerText = "";
                document.getElementById('result-msg').innerText = "";
            }
        }

        function showFloatingScore(pts) {
            const el = document.createElement('div'); el.className = 'score-popup'; el.innerText = `+${pts}`;
            document.body.appendChild(el); setTimeout(() => el.remove(), 1500);
        }

        function triggerFarmerAndAnimLogic(dist, timeUsed) {
            const speech = document.getElementById('speech-bubble');
            let msg = "";

            if (dist <= 3) {
                let chosenAnim;
                if (playedAnimsCount < 3) {
                    const randIndex = Math.floor(Math.random() * availableAnims.length);
                    chosenAnim = availableAnims[randIndex];
                    availableAnims.splice(randIndex, 1);
                } else {
                    const allAnims = ['tractor', 'sheaf', 'vibe'];
                    chosenAnim = allAnims[Math.floor(Math.random() * allAnims.length)];
                }
                playedAnimsCount++;

                if (chosenAnim === 'tractor') { 
                    msg = "טרקטור אמיתי- חרשת כבר את המשחק"; 
                    animTractor(); 
                } 
                else if (chosenAnim === 'sheaf') { 
                    msg = "מגיע לך זר על זה!"; 
                    animGiantSheaf(); 
                } 
                else { 
                    msg = "צלף! כולם בחדר אוכל מדברים עליך"; 
                    animDiningHall(); 
                }
            } 
            else if (dist <= 20) {
                const msgs = ["זבםםם!! פגעת בול", "וואו, מגיעה לך דירה בשיוך...", "מדויק! צלם מסך ושלח בקהילנט", "קרוב בצורה מפתיעה..."]; 
                msg = msgs[Math.floor(Math.random()*msgs.length)];
            }
            else if (dist <= 40) {
                const msgs = ["רואים שאתה גר באזור", "בדוק שיש לך חברים משם", "יש מעיין מוכר באזור", "יפה, עשית שנת שירות?"];
                msg = msgs[Math.floor(Math.random()*msgs.length)];
            }
            else if (dist <= 70) {
                const msgs = ["אין לשם תחבצ איך תדע?", "מה קרה התחלנו להמציא?", "יש קיבוצים שאף אחד לא גר בהם", "לסבתא יש סיפור מעניין על הקיבוץ הזה"];
                msg = msgs[Math.floor(Math.random()*msgs.length)];
            }
            else {
                if (timeUsed > 10 || dist === 999) {
                    const msgs = ["ניחוש לא באירוע", "צא ובדוק בגוגל", "גם איטי וגם טיפש", "ויתרתי, זה יותר מידי חומר להשלים לך..."];
                    msg = msgs[Math.floor(Math.random()*msgs.length)];
                } else {
                    const msgs = ["מאיפה הביטחון אחי", "לא יצאת מתל אביב אה ?!", "כשאתה עונה כזה מהר- אתה עובד רק על עצמך", '"רפת- מקום בו מגדלים פרות" נתחיל איתך מהבסיס...'];
                    msg = msgs[Math.floor(Math.random()*msgs.length)];
                }
            }

            speech.innerText = msg;
            document.getElementById('farmer-container').classList.add('show');
            setTimeout(() => document.getElementById('farmer-container').classList.remove('show'), 5300); 
        }

        const R_TO_L_DURATION = 3400; 

        function animTractor() {
            const scene = document.getElementById('tractor-scene'); const dirt = document.getElementById('plowed-dirt'); const tractor = document.getElementById('the-tractor');
            scene.style.display = 'block'; 
            void scene.offsetWidth; 
            
            // ניקוי האנימציה הקודמת כדי למנוע היתקעות במקום
            tractor.getAnimations().forEach(a => a.cancel());
            dirt.getAnimations().forEach(a => a.cancel());

            sndTractor.play().catch(e => {}); document.body.classList.add('shake'); tractor.classList.add('tractor-shaking');
            
            tractor.animate([{ right: '-100%' }, { right: '150%' }], { duration: R_TO_L_DURATION, easing: 'linear', fill: 'forwards' });
            dirt.animate([{ width: '0%' }, { width: '100%' }], { duration: R_TO_L_DURATION, easing: 'linear', fill: 'forwards' });
            
            setTimeout(() => { document.body.classList.remove('shake'); tractor.classList.remove('tractor-shaking'); }, R_TO_L_DURATION);
            setTimeout(() => { scene.style.display = 'none'; }, R_TO_L_DURATION + 1000);
        }

        function animGiantSheaf() {
            const scene = document.getElementById('sheaf-scene'); const wheat = document.getElementById('wheat-field'); const sheaf = document.getElementById('the-sheaf');
            scene.style.display = 'block'; 
            void scene.offsetWidth; 
            
            // ניקוי האנימציה הקודמת
            sheaf.getAnimations().forEach(a => a.cancel());
            wheat.getAnimations().forEach(a => a.cancel());

            sndWind.play().catch(e => {}); 
            
            sheaf.animate([
                { left: '150%', transform: 'translate(-50%, -50%) rotate(15deg)', offset: 0 },
                { left: '50%', transform: 'translate(-50%, -50%) rotate(0deg)', offset: 0.2 },
                { left: '50%', transform: 'translate(-50%, -50%) rotate(5deg)', offset: 0.3 },
                { left: '50%', transform: 'translate(-50%, -50%) rotate(-5deg)', offset: 0.4 },
                { left: '50%', transform: 'translate(-50%, -50%) rotate(5deg)', offset: 0.5 },
                { left: '50%', transform: 'translate(-50%, -50%) rotate(-5deg)', offset: 0.6 },
                { left: '50%', transform: 'translate(-50%, -50%) rotate(0deg)', offset: 0.75 },
                { left: '-50%', transform: 'translate(-50%, -50%) rotate(-15deg)', offset: 1 }
            ], { duration: R_TO_L_DURATION, easing: 'ease-in-out', fill: 'forwards' });
            
            wheat.animate([{ width: '0%' }, { width: '100%' }], { duration: R_TO_L_DURATION, easing: 'linear', fill: 'forwards' });
            
            setTimeout(() => { scene.style.display = 'none'; }, R_TO_L_DURATION + 1000);
        }

        function animDiningHall() {
            const wall = document.getElementById('dining-hall');
            const vibe = document.getElementById('the-vibe');
            
            wall.style.display = 'block';
            wall.style.opacity = 0.95;
            void wall.offsetWidth; 
            
            // פה הגיבור שלנו! מוחק את האנימציה הקודמת שהשאירה אותם מחוץ למסך
            vibe.getAnimations().forEach(a => a.cancel());
            wall.getAnimations().forEach(a => a.cancel());

            sndDining.play().catch(e => {});
            
            vibe.animate([
                { transform: 'translateX(200%)', offset: 0 },         
                { transform: 'translateX(-45%)', offset: 0.20 },      
                { transform: 'translateX(-55%)', offset: 0.50 },      
                { transform: 'translateX(-45%)', offset: 0.80 },      
                { transform: 'translateX(-300%)', offset: 1 }         
            ], { 
                duration: R_TO_L_DURATION, 
                easing: 'ease-in-out', 
                fill: 'forwards' 
            });
            
            setTimeout(() => {
                wall.animate([{ opacity: 0.95 }, { opacity: 0 }], { duration: 400, fill: 'forwards' });
            }, R_TO_L_DURATION - 400);

            setTimeout(() => {
                wall.style.display = 'none';
                wall.style.opacity = 0.95; 
                sndDining.pause();
                sndDining.currentTime = 0;
            }, R_TO_L_DURATION + 100);
        }

        window.onload = () => { initMap(); map.on('click', handleMapClick); };
    </script>
</body>
</html>
