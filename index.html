    <script>
        const firebaseConfig = { apiKey: "AIzaSyAVXoCgOCgB9m1GOa1bbFen1rEzXCjEhvQ", authDomain: "kibbutzes.firebaseapp.com", projectId: "kibbutzes", storageBucket: "kibbutzes.firebasestorage.app", messagingSenderId: "433815834468", appId: "1:433815834468:web:a30ab44821a3652e35f471" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        let kibbutzim = []; let currentKibbutz = null; let timerInterval; let timeLeft = 15; let map, actualMarker, guessMarker, resultLine; let isRoundActive = false; let currentRound = 1; const MAX_ROUNDS = 10; let totalScore = 0; let highScore = 0; let playerName = ""; let gameStartTime = 0; const MIN_GAME_TIME = 85; 
        let specialRounds = []; let farmerRounds = []; let availableAnims = ['tractor', 'sheaf', 'vibe']; let playedAnimsCount = 0; let mapLayer, satelliteLayer;
        const sndWind = new Audio('https://www.soundjay.com/nature/sounds/wind-01.mp3'); const sndTractor = new Audio('https://actions.google.com/sounds/v1/transportation/tractor_driving_by.ogg'); const sndDining = new Audio('https://actions.google.com/sounds/v1/ambience/coffee_shop.ogg'); 

        async function initMap() { mapLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap' }); satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles &copy; Esri' }); map = L.map('map', {zoomControl: false, zoomSnap: 0.1}).setView([31.5, 34.9], 7); mapLayer.addTo(map); loadHighScore(); fetchGlobalLeaderboard(); await fetchKibbutzimData(); }
        async function fetchKibbutzimData() { try { const savedData = localStorage.getItem('kibbutzim_data_v2'); if (savedData) { kibbutzim = JSON.parse(savedData); showWelcomePanel(); return; } const response = await fetch('kibbutzim.kml'); if (!response.ok) throw new Error("שגיאה"); const text = await response.text(); const xmlDoc = new DOMParser().parseFromString(text, "text/xml"); const placemarks = xmlDoc.getElementsByTagName("Placemark"); kibbutzim = []; for (let p of placemarks) { const name = p.getElementsByTagName("name")[0]?.textContent; const coords = p.getElementsByTagName("coordinates")[0]?.textContent.split(','); if (name && coords) kibbutzim.push({name: name.trim(), lng: parseFloat(coords[0]), lat: parseFloat(coords[1])}); } localStorage.setItem('kibbutzim_data_v2', JSON.stringify(kibbutzim)); showWelcomePanel(); } catch (error) { document.getElementById('loading-panel').innerHTML = "<h3>שגיאה!</h3>"; } }
        function showWelcomePanel() { document.getElementById('loading-panel').style.display = 'none'; document.getElementById('welcome-panel').style.display = 'block'; if (playerName && playerName !== "אורח") { document.getElementById('player-nickname').value = playerName; } setTimeout(() => { map.invalidateSize(); map.setView([31.5, 34.9], 7); }, 50); }
        
        function submitNickname() {
            const input = document.getElementById('player-nickname').value.trim(); if (input !== "") { playerName = input; } else if (!playerName) { playerName = "אורח"; }
            currentRound = 1; totalScore = 0; gameStartTime = Date.now(); specialRounds = pickSpecialRounds(); farmerRounds = pickFarmerRounds(); availableAnims = ['tractor', 'sheaf', 'vibe']; playedAnimsCount = 0;
            document.getElementById('welcome-panel').style.display = 'none'; document.getElementById('game-panel').style.display = 'block'; document.getElementById('end-game-ad-container').style.display = 'none';
            document.getElementById('start-btn').innerText = "התחל משחק"; document.getElementById('start-btn').onclick = startRound; document.getElementById('start-btn').style.display = 'block';
            document.getElementById('kibbutz-name').innerHTML = "מוכן להתחיל?"; document.getElementById('round-info').innerText = ""; document.getElementById('result-msg').innerText = "";
            document.getElementById('top-stats-bar').style.display = 'flex'; 
            if (actualMarker) map.removeLayer(actualMarker); if (guessMarker) map.removeLayer(guessMarker); if (resultLine) map.removeLayer(resultLine); setTimeout(() => { map.invalidateSize(); map.setView([31.5, 34.9], 7); }, 50);
        }
        function resetToWelcome() { fetchGlobalLeaderboard(); document.getElementById('game-panel').style.display = 'none'; showWelcomePanel(); }
        async function fetchGlobalLeaderboard() { try { const snapshot = await db.collection('leaderboard').orderBy('score', 'desc').limit(5).get(); const list = document.getElementById('top5-list'); list.innerHTML = ''; if (snapshot.empty) return; snapshot.forEach(doc => { const data = doc.data(); const li = document.createElement('li'); li.innerText = `${data.name} - ${data.score} נק'`; list.appendChild(li); }); } catch (e) { document.getElementById('top5-list').innerHTML = ''; } }
        async function saveScoreToLeaderboard(score, timeTaken) { if (score <= 0 || !playerName) return; try { const querySnapshot = await db.collection('leaderboard').where('name', '==', playerName).get(); if (!querySnapshot.empty) { let docId = null; let existingScore = -1; querySnapshot.forEach(doc => { const data = doc.data(); if (data.score > existingScore) { existingScore = data.score; docId = doc.id; } }); if (score > existingScore) { await db.collection('leaderboard').doc(docId).update({ score: score, timePlayed: timeTaken, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); } } else { await db.collection('leaderboard').add({ name: playerName, score: score, timePlayed: timeTaken, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); } } catch (e) {} }
        function loadHighScore() { const saved = localStorage.getItem('kibbutz_high_score_v3'); if (saved) { highScore = parseInt(saved); document.getElementById('high-score-val').innerText = highScore; } }
        function updateHighScore(newScore) { if (newScore > highScore) { highScore = newScore; localStorage.setItem('kibbutz_high_score_v3', highScore); document.getElementById('high-score-val').innerText = highScore; } }
        function pickSpecialRounds() { let rounds = []; while(rounds.length < 1) { let r = Math.floor(Math.random() * 10) + 1; if(!rounds.includes(r)) rounds.push(r); } return rounds; }

        function startRound() { document.getElementById('farmer-container').classList.remove('show'); document.getElementById('result-msg').innerText = ""; document.getElementById('start-btn').style.display = 'none'; document.getElementById('timer-container').style.display = 'block'; if (actualMarker) map.removeLayer(actualMarker); if (guessMarker) map.removeLayer(guessMarker); if (resultLine) map.removeLayer(resultLine); const randomIndex = Math.floor(Math.random() * kibbutzim.length); currentKibbutz = kibbutzim[randomIndex]; document.getElementById('kibbutz-name').innerText = `איפה זה: ${currentKibbutz.name}?`; document.getElementById('round-info').innerText = `סבב: ${currentRound}/10`; map.setView([32.0, 34.9], 7.9); isRoundActive = true; timeLeft = 15; updateTimerBar(); timerInterval = setInterval(() => { timeLeft -= 0.1; updateTimerBar(); if (timeLeft <= 0) endRound(null); }, 100); }
        function updateTimerBar() { document.getElementById('timer-bar').style.width = ((timeLeft / 15) * 100) + "%"; }
        function handleMapClick(e) { if (isRoundActive) endRound(e.latlng); }
        
        async function endRound(guessLatlng) {
            clearInterval(timerInterval); isRoundActive = false; document.getElementById('timer-container').style.display = 'none';
            const timeUsed = 15 - timeLeft; const actualLatlng = L.latLng(currentKibbutz.lat, currentKibbutz.lng); let isSpecial = specialRounds.includes(currentRound);
            actualMarker = L.circleMarker(actualLatlng, { radius: 6, color: '#d32f2f', fillColor: '#f44336', fillOpacity: 1 }).addTo(map); actualMarker.bindTooltip(currentKibbutz.name, { permanent: true, direction: 'top', className: 'custom-tooltip', offset: [0, -10] }).openTooltip();
            let dist = 999;
            if (guessLatlng) { guessMarker = L.marker(guessLatlng).addTo(map); resultLine = L.polyline([guessLatlng, actualLatlng], {color: '#d32f2f', weight: 3, dashArray: '5, 5'}).addTo(map); dist = guessLatlng.distanceTo(actualLatlng) / 1000; let points = Math.max(0, Math.floor(100 * Math.exp(-dist / 30))); totalScore += points; showFloatingScore(points); document.getElementById('result-msg').innerText = `מרחק: ${dist.toFixed(1)} ק"מ`; map.fitBounds(L.latLngBounds(guessLatlng, actualLatlng), {padding: [40, 40]}); } else { document.getElementById('result-msg').innerText = "נגמר הזמן!"; map.setView(actualLatlng, 10); }
            if (isSpecial && dist <= 3) { isSpecial = false; if (currentRound < MAX_ROUNDS) { specialRounds.push(currentRound + 1); } }
            let hasAnim = false; let hasFarmerOnly = false;
            if (dist <= 3) { hasAnim = true; triggerFarmerAndAnimLogic(dist, timeUsed); } else if (farmerRounds.includes(currentRound)) { hasFarmerOnly = true; triggerFarmerAndAnimLogic(dist, timeUsed); }
            if (isSpecial) { await new Promise(r => setTimeout(r, 1200)); map.removeLayer(actualMarker); if (guessMarker) map.removeLayer(guessMarker); if (resultLine) map.removeLayer(resultLine); mapLayer.remove(); satelliteLayer.addTo(map); map.flyTo(actualLatlng, 15, {duration: 3.3}); await new Promise(r => setTimeout(r, 4600)); map.flyTo(actualLatlng, 12, {duration: 2.3}); await new Promise(r => setTimeout(r, 3800)); satelliteLayer.remove(); mapLayer.addTo(map); map.setView([32.0, 34.9], 7.9); } else if (hasAnim) { await new Promise(r => setTimeout(r, R_TO_L_DURATION)); } else if (hasFarmerOnly) { await new Promise(r => setTimeout(r, 500)); }
            
            const startBtn = document.getElementById('start-btn'); startBtn.style.display = 'block';
            
            if (currentRound < MAX_ROUNDS) {

            } else {
                document.getElementById('end-game-ad-container').style.display = 'block';
                document.getElementById('top-stats-bar').style.display = 'none'; 
                let timeTakenSeconds = Math.floor((Date.now() - gameStartTime) / 1000); let isCheater = timeTakenSeconds < MIN_GAME_TIME;

                startBtn.innerText = "שומר תוצאה..."; startBtn.disabled = true;

                startBtn.innerText = "משחק חדש"; startBtn.disabled = false; startBtn.onclick = resetToWelcome;
                document.getElementById('kibbutz-name').innerHTML = `המשחק הסתיים!<br><span style="color:var(--dark-green);font-size:1.2em;display:block;margin-top:0px;">סך הכל ניקוד: ${totalScore}</span>`;
            }
        }

        function showFloatingScore(pts) { const el = document.createElement('div'); el.className = 'score-popup'; el.innerText = `+${pts}`; document.body.appendChild(el); setTimeout(() => el.remove(), 1500); }
        function triggerFarmerAndAnimLogic(dist, timeUsed) { const speech = document.getElementById('speech-bubble'); let msg = ""; if (dist <= 3) { let chosenAnim; if (playedAnimsCount < 3) { const randIndex = Math.floor(Math.random() * availableAnims.length); chosenAnim = availableAnims[randIndex]; availableAnims.splice(randIndex, 1); } else { const allAnims = ['tractor', 'sheaf', 'vibe']; chosenAnim = allAnims[Math.floor(Math.random() * allAnims.length)]; } playedAnimsCount++; if (chosenAnim === 'tractor') { msg = "טרקטור אמיתי- חרשת כבר את המשחק"; animTractor(); } else if (chosenAnim === 'sheaf') { msg = "מגיע לך זר על זה!"; animGiantSheaf(); } else { msg = "צלף! כולם בחדר אוכל מדברים עליך"; animDiningHall(); } } else if (dist <= 20) { const msgs = ["זבםםם!! פגעת בול", "וואו, מגיעה לך דירה בשיוך...", "מדויק! צלם מסך ושלח בקהילנט", "קרוב בצורה מפתיעה..."]; msg = msgs[Math.floor(Math.random()*msgs.length)]; } else if (dist <= 40) { const msgs = ["רואים שאתה גר באזור", "בדוק שיש לך חברים משם", "יש מעיין מוכר באזור", "יפה, עשית שנת שירות?"]; msg = msgs[Math.floor(Math.random()*msgs.length)]; } else if (dist <= 70) { const msgs = ["אין לשם תחבצ איך תדע?", "מה קרה התחלנו להמציא?", "יש קיבוצים שאף אחד לא גר בהם", "לסבתא יש סיפור מעניין על הקיבוץ הזה"]; msg = msgs[Math.floor(Math.random()*msgs.length)]; } else { if (timeUsed > 10 || dist === 999) { const msgs = ["ניחוש לא באירוע", "צא ובדוק בגוגל", "גם איטי וגם טיפש", "ויתרתי, זה יותר מידי חומר להשלים לך..."]; msg = msgs[Math.floor(Math.random()*msgs.length)]; } else { const msgs = ["מאיפה הביטחון אחי", "לא יצאת מתל אביב אה ?!", "כשאתה עונה כזה מהר- אתה עובד רק על עצמך", '"רפת- מקום בו מגדלים פרות" נתחיל איתך מהבסיס...']; msg = msgs[Math.floor(Math.random()*msgs.length)]; } } speech.innerText = msg; document.getElementById('farmer-container').classList.add('show'); setTimeout(() => document.getElementById('farmer-container').classList.remove('show'), 5300); }
        const R_TO_L_DURATION = 3400; 
        function animTractor() { const scene = document.getElementById('tractor-scene'); const dirt = document.getElementById('plowed-dirt'); const tractor = document.getElementById('the-tractor'); scene.style.display = 'block'; void scene.offsetWidth; sndTractor.play().catch(e => {}); document.body.classList.add('shake'); tractor.classList.add('tractor-shaking'); const tAnim = tractor.animate([{ right: '-100%' }, { right: '150%' }], { duration: R_TO_L_DURATION, easing: 'linear', fill: 'forwards' }); const dAnim = dirt.animate([{ width: '0%' }, { width: '100%' }], { duration: R_TO_L_DURATION, easing: 'linear', fill: 'forwards' }); setTimeout(() => { document.body.classList.remove('shake'); tractor.classList.remove('tractor-shaking'); }, R_TO_L_DURATION); setTimeout(() => { scene.style.display = 'none'; if(tAnim) tAnim.cancel(); if(dAnim) dAnim.cancel(); }, R_TO_L_DURATION + 100); }
        function animGiantSheaf() { const scene = document.getElementById('sheaf-scene'); const wheat = document.getElementById('wheat-field'); const sheaf = document.getElementById('the-sheaf'); scene.style.display = 'block'; void scene.offsetWidth; sndWind.play().catch(e => {}); const sAnim = sheaf.animate([ { left: '150%', transform: 'translate(-50%, -50%) rotate(15deg)', offset: 0 }, { left: '50%', transform: 'translate(-50%, -50%) rotate(0deg)', offset: 0.2 }, { left: '50%', transform: 'translate(-50%, -50%) rotate(5deg)', offset: 0.3 }, { left: '50%', transform: 'translate(-50%, -50%) rotate(-5deg)', offset: 0.4 }, { left: '50%', transform: 'translate(-50%, -50%) rotate(5deg)', offset: 0.5 }, { left: '50%', transform: 'translate(-50%, -50%) rotate(-5deg)', offset: 0.6 }, { left: '50%', transform: 'translate(-50%, -50%) rotate(0deg)', offset: 0.75 }, { left: '-50%', transform: 'translate(-50%, -50%) rotate(-15deg)', offset: 1 } ], { duration: R_TO_L_DURATION, easing: 'ease-in-out', fill: 'forwards' }); const wAnim = wheat.animate([{ width: '0%' }, { width: '100%' }], { duration: R_TO_L_DURATION, easing: 'linear', fill: 'forwards' }); setTimeout(() => { scene.style.display = 'none'; if(sAnim) sAnim.cancel(); if(wAnim) wAnim.cancel(); }, R_TO_L_DURATION + 100); }
        function animDiningHall() { const wall = document.getElementById('dining-hall'); const vibe = document.getElementById('the-vibe'); wall.style.display = 'block'; wall.style.opacity = 0.95; void wall.offsetWidth; sndDining.play().catch(e => {}); const vAnim = vibe.animate([ { transform: 'translateX(200%)', offset: 0 }, { transform: 'translateX(-45%)', offset: 0.20 }, { transform: 'translateX(-55%)', offset: 0.50 }, { transform: 'translateX(-45%)', offset: 0.80 }, { transform: 'translateX(-300%)', offset: 1 } ], { duration: R_TO_L_DURATION, easing: 'ease-in-out', fill: 'forwards' }); setTimeout(() => { const fadeAnim = wall.animate([{ opacity: 0.95 }, { opacity: 0 }], { duration: 400, fill: 'forwards' }); setTimeout(() => { wall.style.display = 'none'; wall.style.opacity = 0.95; if(fadeAnim) fadeAnim.cancel(); if(vAnim) vAnim.cancel(); }, 400); }, R_TO_L_DURATION - 400); setTimeout(() => { sndDining.pause(); sndDining.currentTime = 0; }, R_TO_L_DURATION + 100); }
        document.addEventListener('click', function(event) { const hintContainer = document.getElementById('install-hint'); if (hintContainer) { if (hintContainer.contains(event.target)) { hintContainer.classList.toggle('show'); } else { hintContainer.classList.remove('show'); } } });
        window.onload = () => { initMap(); map.on('click', handleMapClick); };
